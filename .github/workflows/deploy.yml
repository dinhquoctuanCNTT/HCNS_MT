name: Deploy HCNS_MT to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install --production

      - name: Copy backend to server
        run: |
          robocopy backend C:\HCNS_MT\backend /E /XD node_modules .git /XF .env
          if ($LASTEXITCODE -le 7) { exit 0 }
        shell: powershell

      - name: Restart backend with PM2
        run: |
          $list = pm2 list
          if ($list -match "backend") {
            pm2 restart backend
          } else {
            pm2 start C:\HCNS_MT\backend\src\index.js --name backend
          }
          pm2 save
        shell: powershell

  deploy-frontend:
    runs-on: self-hosted
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: https://unjustly-paralegal-jellied.ngrok-free.dev
        run: npm run build

      - name: Clear old frontend
        run: |
          if (Test-Path C:\HCNS_MT\frontend) {
            Remove-Item C:\HCNS_MT\frontend\* -Recurse -Force
          }
        shell: powershell

      - name: Copy frontend to IIS
        run: xcopy /E /Y /I /Q frontend\dist C:\HCNS_MT\frontend

  deploy-mobile:
    runs-on: self-hosted
    needs: deploy-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install EAS CLI
        run: npm install -g eas-cli
        shell: powershell

      - name: Install mobile dependencies
        working-directory: ./mobile
        run: npm install
        shell: powershell

      - name: EAS OTA Update
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch preview --message "CI deploy from main (${{ github.sha }})" --non-interactive
        shell: powershell
