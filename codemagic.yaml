workflows:
  android-release:
    name: Android Release (Mobile)
    max_build_duration: 60
    environment:
      flutter: stable
    working_directory: mobile
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      # Bỏ chữ "mobile/" đi vì chúng ta đã ở sẵn trong thư mục mobile rồi
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - it@mtholdings.vn
        notify:
          success: true
          failure: true
